{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<h1>Create Account</h1>

<form method="POST" action="{{ url_for('register') }}" novalidate>
  <label for="username">Username</label>
  <input type="text" id="username" name="username" placeholder="Choose a username (min 3 chars)" required autofocus />

  <label for="password">Password</label>
  <input type="password" id="password" name="password" placeholder="Choose a password (min 6 chars)" required />

  <label for="confirm_password">Confirm Password</label>
  <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required />

  <button type="submit" class="btn btn-primary">Register</button>
</form>

<div class="link-row">
  Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
</div>
{% endblock %}
